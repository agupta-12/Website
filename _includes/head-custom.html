<script>
  document.addEventListener("DOMContentLoaded", function () {
    const titleLink = document.querySelector("header h1 a");

    if (!titleLink) return;

    const titleText = titleLink.textContent.trim();

    const cvLink = document.createElement("a");
    cvLink.href = "{{ '/Files/CV.pdf' | relative_url }}";
    cvLink.textContent = "CV";

    const h1 = titleLink.parentElement;
    h1.textContent = titleText;
    h1.appendChild(cvLink);

    h1.style.display = "flex";
    h1.style.justifyContent = "space-between";
    h1.style.alignItems = "baseline";
    h1.style.gap = "1rem";

    cvLink.style.fontSize = "1rem";
    cvLink.style.fontWeight = "normal";
    cvLink.style.whiteSpace = "nowrap";
  });
</script>
